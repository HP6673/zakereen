<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marsiya - Zakereen Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f4f4;
  --surface:#ffffff;
  --panel:#eeeeee;
  --border:#d0d0d0;
  --border-dk:#aaaaaa;
  --text:#111111;
  --text-dim:#666666;
  --text-faint:#aaaaaa;
  --accent:#111111;
  --accent-h:#333333;
  --red:#cc2200;
  --green:#1a7a3a;
  --shadow:0 2px 12px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.16),0 2px 8px rgba(0,0,0,.10);
  --sidebar-w:310px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s;white-space:nowrap;user-select:none;}
.btn:hover{border-color:var(--border-dk);background:var(--panel);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-h);border-color:var(--accent-h);}
.btn.danger{border-color:#ddb0b0;color:var(--red);}
.btn.danger:hover{background:#fff0f0;border-color:var(--red);}
.btn.icon{padding:5px;width:28px;height:28px;justify-content:center;}
.btn svg{flex-shrink:0;width:13px;height:13px;}
button:disabled{opacity:.35;cursor:not-allowed;}

.tog{position:relative;display:inline-block;width:32px;height:17px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:17px;transition:.16s;}
.tog-sl::before{content:'';position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.16px;}
.tog input:checked+.tog-sl{background:var(--accent);}
.tog input:checked+.tog-sl::before{transform:translateX(15px);}
.tog-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);}

input[type=range].slider{-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;}
input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}

.field{background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:.13s;width:100%;}
.field:focus{border-color:#888;}
textarea.field{resize:vertical;line-height:1.6;}
.field-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:3px;display:block;}
.field-group{display:flex;flex-direction:column;gap:3px;}

#header{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;z-index:100;flex-shrink:0;}
.logo{font-size:13px;font-weight:600;letter-spacing:.05em;}
.logo span{font-weight:300;color:var(--text-dim);margin-left:4px;}
.header-tools{display:flex;gap:2px;align-items:center;}
.tlb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border-radius:6px;border:1px solid transparent;background:none;cursor:pointer;color:var(--text-dim);transition:.13s;font-size:10px;font-weight:500;font-family:'Inter',sans-serif;letter-spacing:.03em;}
.tlb:hover{background:var(--panel);border-color:var(--border);color:var(--text);}
.tlb.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tlb svg{width:15px;height:15px;}

#app{display:flex;height:calc(100vh - 46px);position:relative;overflow:hidden;}

#pdf-area{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:margin-right .22s ease;}
#pdf-area.sb-open{margin-right:var(--sidebar-w);}

#pdf-toolbar{display:flex;align-items:center;gap:5px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
#pdf-title-input{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-style:italic;padding:4px 9px;border-radius:6px;outline:none;}
#pdf-title-input:focus{border-color:#888;}
.tsep{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 2px;}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;flex-shrink:0;}
.cdot.active,.cdot:hover{border-color:#111;transform:scale(1.18);}

#pdf-body{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:18px;background:var(--bg);}
#pdf-drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:10px;padding:56px 36px;color:var(--text-dim);cursor:pointer;transition:.17s;width:100%;max-width:480px;margin:auto;text-align:center;}
#pdf-drop-zone:hover,#pdf-drop-zone.dragover{border-color:#888;color:var(--text);}
#pdf-drop-zone svg{opacity:.25;margin-bottom:10px;}
#pdf-drop-zone strong{font-size:14px;display:block;margin-bottom:4px;}
#pdf-drop-zone p{font-size:12px;}
#pdf-canvas-wrap{position:relative;display:none;}
#pdf-canvas{display:block;box-shadow:var(--shadow-lg);}
#draw-canvas{position:absolute;top:0;left:0;cursor:crosshair;}

#pdf-nav{display:flex;align-items:center;justify-content:center;gap:7px;padding:7px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
#page-info{font-size:12px;color:var(--text-dim);min-width:80px;text-align:center;}

#sidebar-panel{position:absolute;top:0;right:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;z-index:50;}
#sidebar-panel.open{transform:translateX(0);}
#sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
#sidebar-title{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;}
.sb-content{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:13px;}
.sb-content.active{display:flex;}

.popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);display:none;flex-direction:column;z-index:200;min-width:260px;max-width:380px;resize:both;overflow:hidden;}
.popup.visible{display:flex;}
.popup-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--panel);border-bottom:1px solid var(--border);cursor:move;flex-shrink:0;user-select:none;border-radius:10px 10px 0 0;}
.popup-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--text-dim);text-transform:uppercase;}
.popup-ctrls{display:flex;gap:3px;align-items:center;}
.pin-btn,.cls-btn{width:21px;height:21px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;font-size:12px;line-height:1;}
.pin-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.cls-btn:hover{background:#fff0f0;border-color:var(--red);color:var(--red);}
.popup-body{flex:1;overflow-y:auto;padding:12px;}

#token-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:999;align-items:center;justify-content:center;}
#token-modal.open{display:flex;}
#token-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:13px;box-shadow:var(--shadow-lg);}
#token-box h3{font-size:14px;font-weight:600;}
#token-box p{font-size:12px;color:var(--text-dim);line-height:1.6;}
#token-box a{color:#1a4a8a;}

.sw-display{font-family:'JetBrains Mono',monospace;font-size:2.5rem;color:var(--text);letter-spacing:.02em;text-align:center;padding:10px 0;line-height:1;}
.sw-display .ms{font-size:1.3rem;color:var(--text-dim);}
.sw-ctrls{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:7px;}
.sw-laps{max-height:150px;overflow-y:auto;}
.lap-item{display:flex;justify-content:space-between;padding:5px 9px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-dim);}
.lap-item .ln{color:var(--text);font-weight:500;}
.lap-item .ls{color:var(--green);font-family:'JetBrains Mono',monospace;}
.lap-item .lt{font-family:'JetBrains Mono',monospace;}
.sw-saved{font-size:11px;color:var(--text-dim);font-style:italic;text-align:center;min-height:1.3em;margin-top:5px;}

.beat-circle{width:100px;height:100px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:2.2rem;color:var(--text);margin:0 auto;transition:background .07s,border-color .07s;}
.beat-circle.pulse{background:#e0e0e0;border-color:var(--text);}
.cad-row{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:9px;}
.cad-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}
.cad-bpm{font-family:'JetBrains Mono',monospace;font-size:1.3rem;color:var(--text);}

#voice-vis{width:100%;height:56px;border-radius:6px;background:var(--panel);border:1px solid var(--border);overflow:hidden;margin-bottom:7px;}
#voice-canvas{display:block;width:100%;height:100%;}
.voice-timer{font-family:'JetBrains Mono',monospace;font-size:1.9rem;color:var(--text);text-align:center;margin-bottom:7px;}
.voice-ctrls{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:7px;}
.voice-recs{max-height:130px;overflow-y:auto;}
.rec-item{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;}
.rec-item audio{flex:1;height:22px;}

#audio-drop{border:2px dashed var(--border);border-radius:7px;padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text-dim);cursor:pointer;transition:.14s;text-align:center;}
#audio-drop:hover{border-color:#888;color:var(--text);}
#audio-drop svg{width:26px;height:26px;opacity:.35;}
#audio-player-wrap{display:none;flex-direction:column;gap:9px;}
#audio-filename{font-size:13px;font-style:italic;text-align:center;word-break:break-all;}
#main-audio{width:100%;}

.notes-ta{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-family:'Inter',sans-serif;font-size:13px;line-height:1.7;color:var(--text);resize:none;outline:none;min-height:160px;width:100%;}
.notes-ta::placeholder{color:var(--text-faint);font-style:italic;}

.fb-status{font-size:11px;min-height:1.3em;margin-top:6px;}
.fb-status.ok{color:var(--green);}
.fb-status.err{color:var(--red);}

.g8{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.g6{display:flex;flex-direction:column;gap:6px;}
</style>
</head>
<body>

<div id="token-modal">
  <div id="token-box">
    <h3>GitHub Setup</h3>
    <p>Enter a personal access token with <strong>repo</strong> scope to save feedback to your repository.<br><br>
    <a href="https://github.com/settings/tokens/new" target="_blank">Generate token on GitHub</a></p>
    <div class="field-group"><label class="field-label">Repository (owner/repo)</label><input id="gh-repo" class="field" placeholder="username/repo-name"/></div>
    <div class="field-group"><label class="field-label">Personal Access Token</label><input id="gh-token" class="field" type="password" placeholder="ghp_..."/></div>
    <div class="field-group"><label class="field-label">Feedback file path</label><input id="gh-path" class="field" value="feedback.txt"/></div>
    <div class="g8"><button class="btn primary" id="token-save-btn">Save</button><button class="btn" id="token-cancel-btn">Cancel</button></div>
  </div>
</div>

<div id="header">
  <div class="logo">MARSIYA <span>ZAKEREEN TOOL</span></div>
  <div class="header-tools">
    <button class="tlb" data-tool="stopwatch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M10 2h4"/></svg>Timer
    </button>
    <button class="tlb" data-tool="cadence">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Beat
    </button>
    <button class="tlb" data-tool="voice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>Voice
    </button>
    <button class="tlb" data-tool="audio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>Audio
    </button>
    <button class="tlb" data-tool="notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Notes
    </button>
    <button class="tlb" data-tool="feedback">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Feedback
    </button>
  </div>
</div>

<div id="app">
  <div id="pdf-area">
    <div id="pdf-toolbar">
      <input id="pdf-title-input" type="text" placeholder="Marsiya title..."/>
      <div class="tsep"></div>
      <button class="btn icon" id="tool-pen" title="Pen" style="border-color:#111;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <button class="btn icon" id="tool-highlight" title="Highlight">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="14" width="18" height="6" rx="2" fill="currentColor" opacity=".3"/><path d="M8 14V8l4-4 4 4v6"/></svg>
      </button>
      <button class="btn icon" id="tool-eraser" title="Eraser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11l7 7"/></svg>
      </button>
      <button class="btn icon" id="tool-none" title="Scroll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 0 0-4 0v5M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8M6 14a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-2.5"/></svg>
      </button>
      <div class="tsep"></div>
      <div class="cdot active" style="background:#e03030" data-color="#e03030"></div>
      <div class="cdot" style="background:#111111" data-color="#111111"></div>
      <div class="cdot" style="background:#1a55cc" data-color="#1a55cc"></div>
      <div class="cdot" style="background:#1a8a3a" data-color="#1a8a3a"></div>
      <div class="cdot" style="background:#dd7000" data-color="#dd7000"></div>
      <div class="tsep"></div>
      <input type="range" class="slider" id="brush-size" min="1" max="20" value="3" style="width:66px;" title="Brush size"/>
      <div class="tsep"></div>
      <input type="file" id="pdf-file-input" accept=".pdf" style="display:none"/>
      <button class="btn" id="pdf-upload-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload PDF
      </button>
      <button class="btn primary" id="pdf-export-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export PDF
      </button>
      <div class="tog-row">
        <label class="tog"><input type="checkbox" id="notes-in-pdf" checked/><span class="tog-sl"></span></label>
        <span>Notes page</span>
      </div>
    </div>

    <div id="pdf-body">
      <div id="pdf-drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" width="52" height="52"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <strong>Upload a Marsiya PDF</strong>
        <p>Drag and drop, or click Upload PDF above</p>
      </div>
      <div id="pdf-canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
      </div>
    </div>

    <div id="pdf-nav">
      <button class="btn" id="pdf-prev">Back</button>
      <span id="page-info">--</span>
      <button class="btn" id="pdf-next">Next</button>
      <div class="tsep"></div>
      <button class="btn" id="pdf-clear-page">Clear Page</button>
      <button class="btn danger" id="pdf-clear-all">Clear All</button>
    </div>
  </div>

  <div id="sidebar-panel">
    <div id="sidebar-header">
      <span id="sidebar-title">Tool</span>
      <div class="g8" style="gap:4px;">
        <button class="btn icon" id="sb-undock" title="Pop out" style="width:24px;height:24px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
        <button class="btn icon" id="sb-close" style="width:24px;height:24px;font-size:14px;">x</button>
      </div>
    </div>
    <div class="sb-content" id="sb-stopwatch"></div>
    <div class="sb-content" id="sb-cadence"></div>
    <div class="sb-content" id="sb-voice"></div>
    <div class="sb-content" id="sb-audio"></div>
    <div class="sb-content" id="sb-notes" style="flex:1;"></div>
    <div class="sb-content" id="sb-feedback"></div>
  </div>
</div>

<!-- Popups -->
<div class="popup" id="popup-stopwatch" style="width:290px;">
  <div class="popup-hdr"><span class="popup-title">Stopwatch</span><div class="popup-ctrls"><button class="pin-btn" data-tool="stopwatch" title="Dock">&#9646;</button><button class="cls-btn" data-tool="stopwatch">x</button></div></div>
  <div class="popup-body" id="pop-sw"></div>
</div>
<div class="popup" id="popup-cadence" style="width:290px;">
  <div class="popup-hdr"><span class="popup-title">Cadence / Beat</span><div class="popup-ctrls"><button class="pin-btn" data-tool="cadence" title="Dock">&#9646;</button><button class="cls-btn" data-tool="cadence">x</button></div></div>
  <div class="popup-body" id="pop-cad"></div>
</div>
<div class="popup" id="popup-voice" style="width:310px;">
  <div class="popup-hdr"><span class="popup-title">Voice Recorder</span><div class="popup-ctrls"><button class="pin-btn" data-tool="voice" title="Dock">&#9646;</button><button class="cls-btn" data-tool="voice">x</button></div></div>
  <div class="popup-body" id="pop-voice"></div>
</div>
<div class="popup" id="popup-audio" style="width:290px;">
  <div class="popup-hdr"><span class="popup-title">Audio Player</span><div class="popup-ctrls"><button class="pin-btn" data-tool="audio" title="Dock">&#9646;</button><button class="cls-btn" data-tool="audio">x</button></div></div>
  <div class="popup-body" id="pop-audio"></div>
</div>
<div class="popup" id="popup-notes" style="width:310px;height:340px;">
  <div class="popup-hdr"><span class="popup-title">Notes</span><div class="popup-ctrls"><button class="pin-btn" data-tool="notes" title="Dock">&#9646;</button><button class="cls-btn" data-tool="notes">x</button></div></div>
  <div class="popup-body" style="display:flex;flex-direction:column;flex:1;padding:10px;" id="pop-notes"></div>
</div>
<div class="popup" id="popup-feedback" style="width:310px;">
  <div class="popup-hdr"><span class="popup-title">Feedback</span><div class="popup-ctrls"><button class="pin-btn" data-tool="feedback" title="Dock">&#9646;</button><button class="cls-btn" data-tool="feedback">x</button></div></div>
  <div class="popup-body" id="pop-feedback"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';

/* ---- TOOL HTML ---- */
const THTML = {
  stopwatch: `

/* ---- STATE ---- */
const S = {
  pdfDoc:null, pdfBytes:null, currentPage:1, drawData:{},
  drawMode:'pen', drawColor:'#e03030', brushSize:3, isDrawing:false,
  swRunning:false, swStart:0, swElapsed:0, swRAF:null, swLaps:[], swLastLap:0,
  cadRunning:false, cadBeat:1, cadBeats:4, cadBPM:72, cadTimeout:null,
  mrec:null, vChunks:[], vRunning:false, vPaused:false,
  vStart:0, vElapsed:0, vRAF:null, vBlob:null, vSessions:[],
  aCtx:null, analyser:null, vizRAF:null,
  notes:'',
  toolMode:{}, // tool -> 'popup'|'sidebar'|null
  sbTool:null,
};

/* ---- POPUP / SIDEBAR SYSTEM ---- */
const TOOLS = ['stopwatch','cadence','voice','audio','notes','feedback'];
const LABELS = {stopwatch:'Stopwatch',cadence:'Cadence / Beat',voice:'Voice Recorder',audio:'Audio Player',notes:'Notes',feedback:'Feedback'};
const POP_BODY = {stopwatch:'pop-sw',cadence:'pop-cad',voice:'pop-voice',audio:'pop-audio',notes:'pop-notes',feedback:'pop-feedback'};
const SB_DIV   = {stopwatch:'sb-stopwatch',cadence:'sb-cadence',voice:'sb-voice',audio:'sb-audio',notes:'sb-notes',feedback:'sb-feedback'};
let zTop = 200;

function injectHTML(containerId, tool) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = THTML[tool];
}

function initAllPopups() {
  TOOLS.forEach(t => { injectHTML(POP_BODY[t], t); wireTool(t); });
}

function getLB(tool) { return document.querySelector('.tlb[data-tool="'+tool+'"]'); }
function getPopup(tool) { return document.getElementById('popup-'+tool); }

function openPopup(tool) {
  const p = getPopup(tool); if (!p) return;
  if (!p.style.left) {
    const idx = TOOLS.indexOf(tool);
    p.style.left = (90 + idx*28) + 'px';
    p.style.top  = (80 + idx*28) + 'px';
  }
  p.classList.add('visible');
  bringFront(p);
  S.toolMode[tool] = 'popup';
  getLB(tool)?.classList.add('active');
  makeDraggable(p);
}

function closePopup(tool) {
  getPopup(tool)?.classList.remove('visible');
  if (S.toolMode[tool] === 'popup') { S.toolMode[tool] = null; getLB(tool)?.classList.remove('active'); }
}

function dockSidebar(tool) {
  getPopup(tool)?.classList.remove('visible');
  if (S.sbTool && S.sbTool !== tool) {
    document.getElementById(SB_DIV[S.sbTool])?.classList.remove('active');
    getLB(S.sbTool)?.classList.remove('active');
    S.toolMode[S.sbTool] = null;
  }
  injectHTML(SB_DIV[tool], tool);
  wireTool(tool);
  document.getElementById(SB_DIV[tool])?.classList.add('active');
  document.getElementById('sidebar-title').textContent = LABELS[tool];
  document.getElementById('sidebar-panel').classList.add('open');
  document.getElementById('pdf-area').classList.add('sb-open');
  S.sbTool = tool; S.toolMode[tool] = 'sidebar';
  getLB(tool)?.classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebar-panel').classList.remove('open');
  document.getElementById('pdf-area').classList.remove('sb-open');
  if (S.sbTool) { document.getElementById(SB_DIV[S.sbTool])?.classList.remove('active'); getLB(S.sbTool)?.classList.remove('active'); S.toolMode[S.sbTool]=null; S.sbTool=null; }
}

function toggleTool(tool) {
  const m = S.toolMode[tool];
  if (!m) { openPopup(tool); }
  else if (m === 'popup') { const p=getPopup(tool); p.classList.contains('visible') ? bringFront(p) : openPopup(tool); }
  else if (m === 'sidebar') { document.getElementById('sidebar-panel').classList.add('open'); document.getElementById('pdf-area').classList.add('sb-open'); }
}

function bringFront(el) { el.style.zIndex = ++zTop; }

function makeDraggable(popup) {
  const hdr = popup.querySelector('.popup-hdr');
  if (hdr._drag) return; hdr._drag = true;
  let sx,sy,ox,oy;
  hdr.addEventListener('mousedown', e => {
    if (e.target.closest('button')) return;
    sx=e.clientX; sy=e.clientY;
    const r=popup.getBoundingClientRect(); ox=r.left; oy=r.top;
    popup.style.right='auto'; popup.style.bottom='auto'; bringFront(popup);
    const mv = e => { popup.style.left=(ox+e.clientX-sx)+'px'; popup.style.top=(oy+e.clientY-sy)+'px'; };
    const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

document.querySelectorAll('.tlb[data-tool]').forEach(b => b.addEventListener('click', () => toggleTool(b.dataset.tool)));
document.querySelectorAll('.cls-btn').forEach(b => b.addEventListener('click', () => closePopup(b.dataset.tool)));
document.querySelectorAll('.pin-btn').forEach(b => b.addEventListener('click', () => dockSidebar(b.dataset.tool)));
document.querySelectorAll('.popup').forEach(p => p.addEventListener('mousedown', () => bringFront(p)));
document.getElementById('sb-close').addEventListener('click', closeSidebar);
document.getElementById('sb-undock').addEventListener('click', () => { const t=S.sbTool; if(t){ closeSidebar(); openPopup(t); } });

/* ---- PDF ---- */
if (typeof pdfjsLib!=='undefined') pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const pdfCvs=document.getElementById('pdf-canvas'),drwCvs=document.getElementById('draw-canvas');
const pdfCtx=pdfCvs.getContext('2d'),drwCtx=drwCvs.getContext('2d');
const pdfWrap=document.getElementById('pdf-canvas-wrap'),dropZ=document.getElementById('pdf-drop-zone');

async function renderPage(n){
  if(!S.pdfDoc)return;
  const pg=await S.pdfDoc.getPage(n),vp=pg.getViewport({scale:1.4});
  pdfCvs.width=drwCvs.width=vp.width; pdfCvs.height=drwCvs.height=vp.height;
  await pg.render({canvasContext:pdfCtx,viewport:vp}).promise;
  restoreDraw(n);
  document.getElementById('page-info').textContent='Page '+n+' of '+S.pdfDoc.numPages;
}
function restoreDraw(n){ drwCtx.clearRect(0,0,drwCvs.width,drwCvs.height); (S.drawData[n]||[]).forEach(replayS); }
function replayS(s){
  if(!s.points||s.points.length<2)return;
  drwCtx.globalAlpha=s.highlight?.35:1; drwCtx.strokeStyle=s.color; drwCtx.lineWidth=s.size;
  drwCtx.lineCap=drwCtx.lineJoin='round'; drwCtx.beginPath(); drwCtx.moveTo(s.points[0].x,s.points[0].y);
  s.points.forEach(p=>drwCtx.lineTo(p.x,p.y)); drwCtx.stroke(); drwCtx.globalAlpha=1;
}
function getPos(e){ const r=drwCvs.getBoundingClientRect(),sx=drwCvs.width/r.width,sy=drwCvs.height/r.height,src=e.touches?e.touches[0]:e; return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy}; }
let curS=null;
function sDraw(e){if(S.drawMode==='none')return;e.preventDefault();const p=getPos(e);S.isDrawing=true;if(S.drawMode==='eraser'){eraseAt(p);return;}curS={color:S.drawColor,size:S.brushSize,highlight:S.drawMode==='highlight',points:[p]};}
function mDraw(e){if(!S.isDrawing)return;e.preventDefault();const p=getPos(e);if(S.drawMode==='eraser'){eraseAt(p);return;}if(!curS)return;curS.points.push(p);restoreDraw(S.currentPage);replayS(curS);}
function eDraw(){if(!S.isDrawing)return;S.isDrawing=false;if(curS&&curS.points.length>1){if(!S.drawData[S.currentPage])S.drawData[S.currentPage]=[];S.drawData[S.currentPage].push(curS);}curS=null;}
function eraseAt(p){const r=20*(S.brushSize/3);S.drawData[S.currentPage]=(S.drawData[S.currentPage]||[]).filter(s=>!s.points.some(q=>Math.hypot(q.x-p.x,q.y-p.y)<r));restoreDraw(S.currentPage);}
drwCvs.addEventListener('mousedown',sDraw);drwCvs.addEventListener('mousemove',mDraw);drwCvs.addEventListener('mouseup',eDraw);drwCvs.addEventListener('mouseleave',eDraw);
drwCvs.addEventListener('touchstart',sDraw,{passive:false});drwCvs.addEventListener('touchmove',mDraw,{passive:false});drwCvs.addEventListener('touchend',eDraw);

['pen','highlight','eraser','none'].forEach(t=>{
  document.getElementById('tool-'+t).addEventListener('click',()=>{
    S.drawMode=t;
    document.querySelectorAll('#pdf-toolbar .btn.icon').forEach(b=>b.style.borderColor='var(--border)');
    document.getElementById('tool-'+t).style.borderColor='#111';
    drwCvs.style.cursor=t==='none'?'default':t==='eraser'?'cell':'crosshair';
  });
});
document.querySelectorAll('.cdot').forEach(d=>d.addEventListener('click',()=>{document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));d.classList.add('active');S.drawColor=d.dataset.color;}));
document.getElementById('brush-size').addEventListener('input',e=>S.brushSize=+e.target.value);

function loadPDF(bytes){
  S.pdfBytes=bytes;
  if(typeof pdfjsLib==='undefined'){alert('PDF.js not loaded.');return;}
  pdfjsLib.getDocument({data:bytes}).promise.then(doc=>{
    S.pdfDoc=doc;S.currentPage=1;S.drawData={};dropZ.style.display='none';pdfWrap.style.display='block';
    document.getElementById('pdf-export-btn').disabled=false;renderPage(1);
  });
}
document.getElementById('pdf-upload-btn').addEventListener('click',()=>document.getElementById('pdf-file-input').click());
document.getElementById('pdf-file-input').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;if(!document.getElementById('pdf-title-input').value)document.getElementById('pdf-title-input').value=f.name.replace('.pdf','');const fr=new FileReader();fr.onload=ev=>loadPDF(new Uint8Array(ev.target.result));fr.readAsArrayBuffer(f);});
dropZ.addEventListener('dragover',e=>{e.preventDefault();dropZ.classList.add('dragover');});
dropZ.addEventListener('dragleave',()=>dropZ.classList.remove('dragover'));
dropZ.addEventListener('drop',e=>{e.preventDefault();dropZ.classList.remove('dragover');const f=e.dataTransfer.files[0];if(!f||!f.name.endsWith('.pdf'))return;const fr=new FileReader();fr.onload=ev=>loadPDF(new Uint8Array(ev.target.result));fr.readAsArrayBuffer(f);});
document.getElementById('pdf-prev').addEventListener('click',()=>{if(S.currentPage>1){S.currentPage--;renderPage(S.currentPage);}});
document.getElementById('pdf-next').addEventListener('click',()=>{if(S.pdfDoc&&S.currentPage<S.pdfDoc.numPages){S.currentPage++;renderPage(S.currentPage);}});
document.getElementById('pdf-clear-page').addEventListener('click',()=>{S.drawData[S.currentPage]=[];restoreDraw(S.currentPage);});
document.getElementById('pdf-clear-all').addEventListener('click',()=>{if(!confirm('Clear all markup?'))return;S.drawData={};restoreDraw(S.currentPage);});
document.getElementById('pdf-export-btn').addEventListener('click',exportPDF);

async function exportPDF(){
  if(!S.pdfDoc)return;
  const title=document.getElementById('pdf-title-input').value||'marsiya';
  const incNotes=document.getElementById('notes-in-pdf').checked;
  const notes=S.notes;
  const pagesData=[];
  for(let i=1;i<=S.pdfDoc.numPages;i++){
    const pg=await S.pdfDoc.getPage(i),vp=pg.getViewport({scale:1.4});
    const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
    const cx=c.getContext('2d');await pg.render({canvasContext:cx,viewport:vp}).promise;
    (S.drawData[i]||[]).forEach(s=>{cx.globalAlpha=s.highlight?.35:1;cx.strokeStyle=s.color;cx.lineWidth=s.size;cx.lineCap=cx.lineJoin='round';if(s.points?.length>=2){cx.beginPath();cx.moveTo(s.points[0].x,s.points[0].y);s.points.forEach(p=>cx.lineTo(p.x,p.y));cx.stroke();}cx.globalAlpha=1;});
    pagesData.push({w:vp.width,h:vp.height,d:c.toDataURL('image/jpeg',.92)});
  }
  if(incNotes&&notes.trim()){
    const nc=document.createElement('canvas');nc.width=595;nc.height=842;
    const nx=nc.getContext('2d');nx.fillStyle='#fff';nx.fillRect(0,0,595,842);
    nx.fillStyle='#111';nx.font='bold 18px serif';nx.textAlign='center';nx.fillText('NOTES',297,48);
    nx.font='14px serif';nx.textAlign='left';let y=80;
    notes.split('\n').forEach(line=>{const words=line.split(' ');let cur='';words.forEach(w=>{const t=cur+w+' ';if(nx.measureText(t).width>520){nx.fillText(cur,40,y);y+=20;cur=w+' ';}else cur=t;});if(cur.trim()){nx.fillText(cur,40,y);y+=20;}else y+=7;});
    pagesData.push({w:595,h:842,d:nc.toDataURL('image/jpeg',.92)});
  }
  const pdfOut=buildPDF(pagesData);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([pdfOut],{type:'application/pdf'}));a.download=title.replace(/[^\w\s-]/g,'')+'.pdf';a.click();
}

function buildPDF(pages){
  const parts=['%PDF-1.4\n'];let off=parts[0].length;
  const xr=[],pids=[];let nid=3;
  const PAGES=2,CAT=1;
  for(let i=0;i<pages.length;i++){
    const {w,h,d}=pages[i];
    const iid=nid++,pid=nid++;pids.push(pid);
    const b64=d.split(',')[1],raw=atob(b64),by=new Uint8Array(raw.length);
    for(let j=0;j<raw.length;j++)by[j]=raw.charCodeAt(j);
    const iobj='<< /Type /XObject /Subtype /Image /Width '+w+' /Height '+h+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+by.length+' >>\nstream\n';
    xr[iid]=off;const ih=iid+' 0 obj\n';parts.push(ih);off+=ih.length;parts.push(iobj);off+=iobj.length;
    const bs=Array.from(by).map(b=>String.fromCharCode(b)).join('');parts.push(bs);off+=bs.length;
    const it='\nendstream\nendobj\n';parts.push(it);off+=it.length;
    const ptW=(w*72/96).toFixed(2),ptH=(h*72/96).toFixed(2);
    const cs='q '+ptW+' 0 0 '+ptH+' 0 0 cm /Im'+i+' Do Q';
    const cid=nid++;xr[cid]=off;
    const co=cid+' 0 obj\n<< /Length '+cs.length+' >>\nstream\n'+cs+'\nendstream\nendobj\n';parts.push(co);off+=co.length;
    xr[pid]=off;
    const po=pid+' 0 obj\n<< /Type /Page /Parent '+PAGES+' 0 R /MediaBox [0 0 '+ptW+' '+ptH+'] /Resources << /XObject << /Im'+i+' '+iid+' 0 R >> >> /Contents '+cid+' 0 R >>\nendobj\n';parts.push(po);off+=po.length;
  }
  xr[PAGES]=off;const pg=PAGES+' 0 obj\n<< /Type /Pages /Kids ['+pids.map(id=>id+' 0 R').join(' ')+'] /Count '+pages.length+' >>\nendobj\n';parts.push(pg);off+=pg.length;
  xr[CAT]=off;const ct=CAT+' 0 obj\n<< /Type /Catalog /Pages '+PAGES+' 0 R >>\nendobj\n';parts.push(ct);off+=ct.length;
  const mx=nid-1;let xrs='xref\n0 '+(mx+1)+'\n0000000000 65535 f \n';
  for(let i=1;i<=mx;i++)xrs+=((xr[i]||0).toString().padStart(10,'0'))+' 00000 n \n';
  parts.push(xrs);parts.push('trailer\n<< /Size '+(mx+1)+' /Root '+CAT+' 0 R >>\nstartxref\n'+off+'\n%%EOF');
  return parts.join('');
}

/* ---- WIRE TOOLS ---- */
function wireTool(tool){
  if(tool==='stopwatch')wireSW();
  else if(tool==='cadence')wireCad();
  else if(tool==='voice')wireVoice();
  else if(tool==='audio')wireAudio();
  else if(tool==='notes')wireNotes();
  else if(tool==='feedback')wireFB();
}

function pad(n,d=2){return String(Math.floor(n)).padStart(d,'0');}
function fmtMS(ms){return pad(ms/60000)+':'+pad((ms%60000)/1000)+'.'+pad((ms%1000)/10);}

function wireSW(){
  const g=id=>document.getElementById(id);
  function upd(){const e=S.swElapsed;g('sw-h').textContent=pad(e/3600000);g('sw-m').textContent=pad((e%3600000)/60000);g('sw-s').textContent=pad((e%60000)/1000);g('sw-ms').textContent=pad((e%1000)/10);}
  function tick(){S.swElapsed=Date.now()-S.swStart;upd();S.swRAF=requestAnimationFrame(tick);}
  function laps(){g('sw-laps').innerHTML=S.swLaps.map((l,i)=>'<div class="lap-item"><span class="ln">Lap '+(i+1)+'</span><span class="ls">+'+fmtMS(l.split)+'</span><span class="lt">'+fmtMS(l.total)+'</span></div>').reverse().join('');}
  upd();laps();
  g('sw-start').addEventListener('click',()=>{
    if(!S.swRunning){S.swStart=Date.now()-S.swElapsed;S.swRunning=true;g('sw-start').textContent='Pause';g('sw-lap').disabled=g('sw-reset').disabled=g('sw-save').disabled=false;tick();}
    else{cancelAnimationFrame(S.swRAF);S.swRunning=false;g('sw-start').textContent='Resume';}
  });
  g('sw-lap').addEventListener('click',()=>{const sp=S.swElapsed-S.swLastLap;S.swLaps.push({total:S.swElapsed,split:sp});S.swLastLap=S.swElapsed;laps();});
  g('sw-reset').addEventListener('click',()=>{cancelAnimationFrame(S.swRAF);S.swRunning=false;S.swElapsed=0;S.swLastLap=0;S.swLaps=[];upd();laps();g('sw-start').textContent='Play';g('sw-lap').disabled=g('sw-reset').disabled=g('sw-save').disabled=true;});
  g('sw-save').addEventListener('click',()=>{const t=g('sw-h').textContent+':'+g('sw-m').textContent+':'+g('sw-s').textContent+'.'+g('sw-ms').textContent;g('sw-saved').textContent='Saved: '+t;navigator.clipboard.writeText(t).catch(()=>{});});
}

let metroCtx=null;
function metroClick(accent){if(!metroCtx)metroCtx=new AudioContext();const o=metroCtx.createOscillator(),g=metroCtx.createGain();o.connect(g);g.connect(metroCtx.destination);o.frequency.value=accent?1200:800;g.gain.setValueAtTime(.6,metroCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,metroCtx.currentTime+.08);o.start();o.stop(metroCtx.currentTime+.1);}

function wireCad(){
  const g=id=>document.getElementById(id);
  function beat(){metroClick(S.cadBeat===1);g('beat-num').textContent=S.cadBeat;g('cad-circle').classList.add('pulse');setTimeout(()=>g('cad-circle').classList.remove('pulse'),120);S.cadBeat=(S.cadBeat%S.cadBeats)+1;if(S.cadRunning)S.cadTimeout=setTimeout(beat,60000/S.cadBPM);}
  g('bpm-slider').value=S.cadBPM;g('bpm-val').textContent=S.cadBPM+' BPM';g('beats-val').textContent=S.cadBeats;
  g('bpm-slider').addEventListener('input',e=>{S.cadBPM=+e.target.value;g('bpm-val').textContent=S.cadBPM+' BPM';});
  g('beats-minus').addEventListener('click',()=>{S.cadBeats=Math.max(1,S.cadBeats-1);g('beats-val').textContent=S.cadBeats;});
  g('beats-plus').addEventListener('click',()=>{S.cadBeats=Math.min(16,S.cadBeats+1);g('beats-val').textContent=S.cadBeats;});
  g('cadence-start').addEventListener('click',()=>{S.cadRunning=true;S.cadBeat=1;g('cadence-start').disabled=true;g('cadence-stop').disabled=false;beat();});
  g('cadence-stop').addEventListener('click',()=>{S.cadRunning=false;clearTimeout(S.cadTimeout);g('beat-num').textContent='1';g('cad-circle').classList.remove('pulse');g('cadence-start').disabled=false;g('cadence-stop').disabled=true;});
}

function wireVoice(){
  const g=id=>document.getElementById(id);
  const vc=g('voice-canvas'),vx=vc.getContext('2d');
  function tick(){S.vElapsed=Date.now()-S.vStart;const m=Math.floor(S.vElapsed/60000),sec=Math.floor((S.vElapsed%60000)/1000);g('voice-timer').textContent=pad(m)+':'+pad(sec);S.vRAF=requestAnimationFrame(tick);}
  function viz(){if(!S.analyser)return;const b=new Uint8Array(S.analyser.frequencyBinCount);S.analyser.getByteTimeDomainData(b);const w=vc.width,h=vc.height;vx.fillStyle='#eee';vx.fillRect(0,0,w,h);vx.strokeStyle='#111';vx.lineWidth=1.5;vx.beginPath();b.forEach((v,i)=>{const x=i/b.length*w,y=(v/128-1)*(h/2)+h/2;i===0?vx.moveTo(x,y):vx.lineTo(x,y);});vx.stroke();S.vizRAF=requestAnimationFrame(viz);}
  async function rec(){
    try{
      const st=await navigator.mediaDevices.getUserMedia({audio:true});
      S.aCtx=new AudioContext();S.analyser=S.aCtx.createAnalyser();S.analyser.fftSize=2048;
      S.aCtx.createMediaStreamSource(st).connect(S.analyser);
      vc.width=g('voice-vis').clientWidth||270;vc.height=56;viz();
      S.mrec=new MediaRecorder(st);S.vChunks=[];
      S.mrec.ondataavailable=e=>S.vChunks.push(e.data);
      S.mrec.onstop=()=>{
        cancelAnimationFrame(S.vizRAF);
        S.vBlob=new Blob(S.vChunks,{type:'audio/webm'});
        const url=URL.createObjectURL(S.vBlob);
        g('voice-audio').src=url;g('voice-playback').style.display='flex';
        g('voice-exp-btn').disabled=g('voice-ow-btn').disabled=false;
        addVRec(url);
      };
      S.mrec.start();S.vRunning=true;S.vStart=Date.now();tick();
      g('voice-rec-btn').disabled=true;g('voice-pause-btn').disabled=g('voice-stop-btn').disabled=false;
    }catch(e){alert('Microphone denied.');}
  }
  function addVRec(url){const idx=++S.vSessions.length,el=document.createElement('div');el.className='rec-item';el.innerHTML='<span style="color:#999;font-size:11px;">S'+idx+'</span><audio controls src="'+url+'"></audio><a href="'+url+'" download="s'+idx+'.webm" class="btn" style="font-size:10px;padding:3px 6px;">DL</a>';g('voice-recs').appendChild(el);}
  g('voice-rec-btn').addEventListener('click',rec);
  g('voice-pause-btn').addEventListener('click',()=>{if(!S.mrec)return;if(!S.vPaused){S.mrec.pause();cancelAnimationFrame(S.vRAF);cancelAnimationFrame(S.vizRAF);S.vPaused=true;g('voice-pause-btn').textContent='Resume';}else{S.mrec.resume();S.vStart=Date.now()-S.vElapsed;tick();viz();S.vPaused=false;g('voice-pause-btn').textContent='Pause';}});
  g('voice-stop-btn').addEventListener('click',()=>{if(!S.mrec)return;S.mrec.stop();cancelAnimationFrame(S.vRAF);S.vRunning=S.vPaused=false;g('voice-rec-btn').disabled=false;g('voice-pause-btn').disabled=g('voice-stop-btn').disabled=true;g('voice-pause-btn').textContent='Pause';});
  g('voice-ow-btn').addEventListener('click',()=>{if(!confirm('Overwrite recording?'))return;S.vBlob=null;g('voice-playback').style.display='none';g('voice-rec-btn').disabled=false;g('voice-ow-btn').disabled=g('voice-exp-btn').disabled=true;g('voice-timer').textContent='00:00';rec();});
  g('voice-exp-btn').addEventListener('click',()=>{if(!S.vBlob)return;const a=document.createElement('a');a.href=URL.createObjectURL(S.vBlob);a.download='rec-'+Date.now()+'.webm';a.click();});
}

function wireAudio(){
  const g=id=>document.getElementById(id);
  function load(f){if(!f)return;g('main-audio').src=URL.createObjectURL(f);g('audio-filename').textContent=f.name;g('audio-drop').style.display='none';g('audio-player-wrap').style.display='flex';}
  g('audio-drop').addEventListener('click',()=>g('audio-file-input').click());
  g('audio-file-input').addEventListener('change',e=>load(e.target.files[0]));
  g('audio-drop').addEventListener('dragover',e=>{e.preventDefault();g('audio-drop').style.borderColor='#888';});
  g('audio-drop').addEventListener('dragleave',()=>g('audio-drop').style.borderColor='');
  g('audio-drop').addEventListener('drop',e=>{e.preventDefault();g('audio-drop').style.borderColor='';load(e.dataTransfer.files[0]);});
  g('audio-change').addEventListener('click',()=>{g('audio-drop').style.display='flex';g('audio-player-wrap').style.display='none';});
}

function wireNotes(){
  const g=id=>document.getElementById(id);
  if(S.notes&&g('notes-area'))g('notes-area').value=S.notes;
  g('notes-area')?.addEventListener('input',e=>{S.notes=e.target.value;});
  g('notes-in-pdf2')?.addEventListener('change',e=>{const el=document.getElementById('notes-in-pdf');if(el)el.checked=e.target.checked;});
  g('notes-save-btn')?.addEventListener('click',()=>{const b=new Blob([S.notes],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='marsiya-notes.txt';a.click();});
  g('notes-clear-btn')?.addEventListener('click',()=>{if(!confirm('Clear all notes?'))return;S.notes='';if(g('notes-area'))g('notes-area').value='';});
}
document.getElementById('notes-in-pdf').addEventListener('change',e=>{const el=document.getElementById('notes-in-pdf2');if(el)el.checked=e.target.checked;});

function loadGH(){document.getElementById('gh-repo').value=localStorage.getItem('gh_repo')||'';document.getElementById('gh-token').value=localStorage.getItem('gh_token')||'';document.getElementById('gh-path').value=localStorage.getItem('gh_path')||'feedback.txt';}
document.getElementById('token-save-btn').addEventListener('click',()=>{localStorage.setItem('gh_repo',document.getElementById('gh-repo').value.trim());localStorage.setItem('gh_token',document.getElementById('gh-token').value.trim());localStorage.setItem('gh_path',document.getElementById('gh-path').value.trim());document.getElementById('token-modal').classList.remove('open');});
document.getElementById('token-cancel-btn').addEventListener('click',()=>document.getElementById('token-modal').classList.remove('open'));

function wireFB(){
  const g=id=>document.getElementById(id);
  g('gh-settings-btn')?.addEventListener('click',()=>{loadGH();document.getElementById('token-modal').classList.add('open');});
  g('fb-submit-btn')?.addEventListener('click',async()=>{
    const name=g('fb-name').value.trim(),body=g('fb-body').value.trim(),st=g('feedback-status');
    if(!body){st.textContent='Please write some feedback.';st.className='fb-status err';return;}
    const tok=localStorage.getItem('gh_token'),repo=localStorage.getItem('gh_repo'),path=localStorage.getItem('gh_path')||'feedback.txt';
    if(!tok||!repo){st.textContent='Configure GitHub first.';st.className='fb-status err';loadGH();document.getElementById('token-modal').classList.add('open');return;}
    st.textContent='Submitting...';st.className='fb-status';
    try{
      let sha='',exist='';
      const gr=await fetch('https://api.github.com/repos/'+repo+'/contents/'+path,{headers:{Authorization:'Bearer '+tok,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;exist=atob(d.content.replace(/\n/g,''));}
      const entry='\n---\nDate: '+new Date().toISOString()+'\nFrom: '+(name||'Anonymous')+'\n\n'+body+'\n';
      const enc=btoa(unescape(encodeURIComponent(exist+entry)));
      const pb={message:'Feedback from '+(name||'Anonymous'),content:enc};if(sha)pb.sha=sha;
      const pr=await fetch('https://api.github.com/repos/'+repo+'/contents/'+path,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json',Accept:'application/vnd.github+json'},body:JSON.stringify(pb)});
      if(!pr.ok)throw new Error((await pr.json()).message||'GitHub error');
      st.textContent='Saved. Thank you!';st.className='fb-status ok';g('fb-name').value='';g('fb-body').value='';
    }catch(err){st.textContent='Error: '+err.message;st.className='fb-status err';}
  });
}
